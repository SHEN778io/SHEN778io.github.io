<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申兆文 | AI 视频创作者</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Permanent+Marker&family=VT323&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{colors:{y2k:{black:'#0a0a0a',yellow:'#FAFF00',white:'#FFFFFF',gray:'#222222'}},fontFamily:{sans:['Space Grotesk','sans-serif'],hand:['Permanent Marker','cursive'],pixel:['VT323','monospace']}}}}
</script>
<style>
:root{--yellow:#FAFF00}
body{background-color:#0a0a0a;color:#fff;overflow-x:hidden}
.noise-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:50;opacity:0.05;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E")}
.grid-bg{position:absolute;top:0;left:0;width:100%;height:100%;background-size:50px 50px;background-image:linear-gradient(to right,rgba(250,255,0,0.08) 1px,transparent 1px),linear-gradient(to bottom,rgba(250,255,0,0.08) 1px,transparent 1px);animation:moveGrid 20s linear infinite;z-index:0;mask-image:linear-gradient(to bottom,black 40%,transparent 100%);-webkit-mask-image:linear-gradient(to bottom,black 40%,transparent 100%)}
@keyframes moveGrid{0%{transform:translateY(0) rotate(0deg) scale(1.2)}100%{transform:translateY(50px) rotate(0deg) scale(1.2)}}
.elastic-in{animation:elastic 1.2s cubic-bezier(0.175,0.885,0.32,1.275) forwards;opacity:0;transform:translateY(50px) scale(0.8)}
@keyframes elastic{to{opacity:1;transform:translateY(0) scale(1)}}
.glow-hover:hover{transform:scale(0.98);text-shadow:0 0 10px var(--yellow),0 0 20px var(--yellow);color:var(--yellow);transition:all 0.3s ease}
.glow-hover{transition:all 0.3s ease}
.float-anim{animation:floating 6s ease-in-out infinite}
@keyframes floating{0%{transform:translateY(0px) rotate(-2deg)}50%{transform:translateY(-15px) rotate(1deg)}100%{transform:translateY(0px) rotate(-2deg)}}
.sticker{transition:transform 0.2s cubic-bezier(0.25,0.46,0.45,0.94)}
.polaroid-container:hover .sticker{animation:wiggle 0.5s ease-in-out infinite alternate}
.polaroid-container:hover .sticker:nth-child(even){animation-direction:alternate-reverse;animation-duration:0.6s}
@keyframes wiggle{0%{transform:rotate(-5deg) scale(1.05)}100%{transform:rotate(5deg) scale(0.95)}}
.decor-curve{position:absolute;z-index:-1;stroke-dasharray:1000;stroke-dashoffset:1000;animation:drawLine 3s ease forwards 1s}
@keyframes drawLine{to{stroke-dashoffset:0}}
.highlight-link{background-color:var(--yellow);color:#000;padding:0 4px;font-weight:bold;cursor:pointer;transition:all 0.2s;display:inline-block}
.highlight-link:hover{background-color:#fff;transform:translateY(-2px);box-shadow:2px 2px 0 var(--yellow)}
.typing-cursor::after{content:'|';animation:blink 1s step-end infinite;color:var(--yellow)}
@keyframes blink{50%{opacity:0}}
.video-grid{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;padding:0 16px}
.video-card{position:relative;border-radius:0;overflow:hidden;cursor:pointer;aspect-ratio:16/9;background:#1a1a1a;border:2px solid #333;transition:all 0.3s ease;opacity:0;transform:translateY(40px) scale(0.95)}
.video-card.visible{opacity:1;transform:translateY(0) scale(1)}
.video-card:hover{transform:translateY(-8px) scale(1.02);border-color:var(--yellow);box-shadow:0 0 30px rgba(250,255,0,0.15)}
.video-card .cover{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative}
.video-card .cover .gradient{width:100%;height:100%;position:absolute;top:0;left:0}
.video-card .cover .play-btn{position:absolute;width:56px;height:56px;background:rgba(250,255,0,0.15);border:2px solid rgba(250,255,0,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;backdrop-filter:blur(4px)}
.video-card:hover .play-btn{background:rgba(250,255,0,0.3);border-color:var(--yellow);transform:scale(1.15)}
.video-card .play-btn::after{content:'';width:0;height:0;border-left:14px solid #fff;border-top:9px solid transparent;border-bottom:9px solid transparent;margin-left:3px}
.video-card .info{position:absolute;bottom:0;left:0;right:0;padding:14px;background:linear-gradient(transparent,rgba(0,0,0,0.9));z-index:1}
.video-card .info .num{font-size:0.7rem;color:var(--yellow);font-weight:500;letter-spacing:2px;margin-bottom:2px;font-family:'VT323',monospace}
.video-card .info .title{font-size:0.95rem;font-weight:700;line-height:1.3}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:20px}
.modal.active{display:flex}
.modal-content{position:relative;width:100%;max-width:960px;aspect-ratio:16/9;background:#000;border:2px solid var(--yellow);overflow:hidden}
.modal-content video,.modal-content iframe{width:100%;height:100%;object-fit:contain;background:#000;border:none}
.modal-close{position:absolute;top:-44px;right:0;background:none;border:2px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.7);font-size:13px;cursor:pointer;padding:6px 16px;font-family:'VT323',monospace;letter-spacing:2px;transition:all 0.2s}
.modal-close:hover{color:var(--yellow);border-color:var(--yellow)}
.hero-bg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70vw;height:70vh;object-fit:contain;z-index:0;animation:kenBurns 20s ease-in-out infinite alternate}
@keyframes kenBurns{0%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-50%,-50%) scale(1.08)}}
.hero-overlay{display:none}
.hero-content{z-index:2;position:relative;pointer-events:none}
.hero-content>*{pointer-events:auto;text-shadow:0 2px 20px rgba(0,0,0,0.5)}

/* 滚动进度条 */
.scroll-progress{position:fixed;top:0;left:0;height:3px;background:var(--yellow);z-index:999;width:0%;transition:width 0.1s linear}

/* 光标跟随 */
.cursor-glow{width:20px;height:20px;border-radius:50%;background:var(--yellow);position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:screen;opacity:0;transform:translate(-50%,-50%);transition:opacity 0.3s;filter:blur(4px)}
.cursor-glow.visible{opacity:0.5}

/* 滚动显现 */
.reveal{opacity:0;transform:translateY(40px);transition:all 0.8s cubic-bezier(0.25,0.46,0.45,0.94)}
.reveal.active{opacity:1;transform:translateY(0)}

/* 回到顶部 */
.back-top{position:fixed;bottom:30px;right:30px;z-index:100;width:48px;height:48px;background:#1a1a1a;border:2px solid #333;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'VT323',monospace;font-size:20px;transition:all 0.3s ease;opacity:0;transform:translateY(20px);pointer-events:none}
.back-top.show{opacity:1;transform:translateY(0);pointer-events:auto}
.back-top:hover{border-color:var(--yellow);color:var(--yellow);box-shadow:0 0 20px rgba(250,255,0,0.15)}

/* 作品计数脉冲 */
.work-counter{font-family:'VT323',monospace;color:var(--yellow);font-size:1.5rem;opacity:0.6;letter-spacing:2px;border-left:2px solid #333;padding-left:16px;margin-left:16px}

@media(max-width:900px){.video-grid{grid-template-columns:repeat(2,1fr);gap:16px}}
@media(max-width:500px){.video-grid{grid-template-columns:1fr;gap:12px}}
</style>
</head>

<!-- ===== MODAL ===== -->
<div class="modal" id="videoModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕ CLOSE</button>
    <video id="player" controls playsinline preload="auto" style="display:none"></video>
    <iframe id="bplayer" allow="autoplay; encrypted-media" allowfullscreen style="display:none"></iframe>
  </div>
</div>

<div id="toast" style="visibility:hidden;min-width:250px;background-color:var(--yellow);color:#000;text-align:center;border-radius:4px;padding:16px;position:fixed;z-index:100;left:50%;bottom:30px;transform:translateX(-50%);font-family:'Space Grotesk',sans-serif;font-weight:bold;box-shadow:4px 4px 0 #fff;opacity:0;transition:opacity 0.3s,bottom 0.3s"></div>

<script>
const works = [
  { title:'猫砂盆', bv:'BV1PcTn6UE8c', colors:['#1a0533','#4a1a7a'] },
  { title:'婴儿车', file:'videos/婴儿车.mp4', colors:['#0a1a3a','#1a5a8a'] },
  { title:'威士忌1', file:'videos/威士忌1.mp4', colors:['#1a1a1a','#4a4a2a'] },
  { title:'威士忌2', file:'videos/威士忌2.mp4', colors:['#0a0a2e','#1a3a6a'] },
  { title:'威士忌3', file:'videos/威士忌3.mp4', colors:['#2a0a1a','#6a1a3a'] },
  { title:'杀虫剂', file:'videos/杀虫剂.mp4', colors:['#1a1a2e','#3a2a5a'] },
  { title:'榨汁机', file:'videos/榨汁机.mp4', colors:['#0a2a1a','#2a5a3a'] },
  { title:'纸巾', file:'videos/纸巾.mp4', colors:['#1a0a2a','#3a1a6a'] },
  { title:'维生素', file:'videos/维生素.mp4', colors:['#0a0a1a','#2a1a5a'] },
  { title:'耳机', file:'videos/耳机.mp4', colors:['#1a0a1a','#5a2a4a'] },
  { title:'饮水机', file:'videos/饮水机.mp4', colors:['#0a1a1a','#2a4a4a'] },
  { title:'鼠标', file:'videos/鼠标.mp4', colors:['#1a1a0a','#4a3a1a'] },
];

const gallery = document.getElementById('gallery');
works.forEach((w,i)=>{
  const card = document.createElement('div');
  card.className = 'video-card';
  card.innerHTML = `
    <div class="cover">
      <div class="gradient" style="background:linear-gradient(135deg,${w.colors[0]},${w.colors[1]})"></div>
      <div class="play-btn"></div>
      <div class="info">
        <div class="num">${String(i+1).padStart(2,'0')}</div>
        <div class="title">${w.title}</div>
      </div>
    </div>`;
  card.addEventListener('click',()=>openModal(i));
  gallery.appendChild(card);
});

function openModal(i){
  const w=works[i];
  const video=document.getElementById('player');
  const iframe=document.getElementById('bplayer');
  video.style.display='none'; iframe.style.display='none';
  if(w.bv){
    iframe.src=`https://player.bilibili.com/player.html?bvid=${w.bv}&autoplay=1&page=1`;
    iframe.style.display='block';
  }else{
    video.src=w.file; video.load(); video.play(); video.style.display='block';
  }
  document.getElementById('videoModal').classList.add('active');
  document.body.style.overflow='hidden';
}

function closeModal(){
  const video=document.getElementById('player');
  const iframe=document.getElementById('bplayer');
  video.pause(); video.src=''; iframe.src='';
  document.getElementById('videoModal').classList.remove('active');
  document.body.style.overflow='';
}

document.getElementById('videoModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// 滚动进度条
window.addEventListener('scroll',()=>{
  const h=document.documentElement.scrollHeight-window.innerHeight;
  document.getElementById('scrollProgress').style.width=(window.scrollY/h*100)+'%';
  document.getElementById('backTop').classList.toggle('show',window.scrollY>window.innerHeight);
});

// 光标跟随
const cg=document.getElementById('cursorGlow');
document.addEventListener('mousemove',e=>{cg.style.left=e.clientX+'px';cg.style.top=e.clientY+'px'});
document.addEventListener('mouseenter',()=>cg.classList.add('visible'));
document.addEventListener('mouseleave',()=>cg.classList.remove('visible'));

// 滚动显现
const revealObserver=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('active');revealObserver.unobserve(e.target)}});
},{threshold:0.15});
document.querySelectorAll('.reveal').forEach(el=>revealObserver.observe(el));

// Hero image mouse parallax
const heroImg=document.getElementById('heroImg');
if(heroImg){
  document.getElementById('hero').addEventListener('mousemove',e=>{
    const r=e.currentTarget.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-0.5;
    const y=(e.clientY-r.top)/r.height-0.5;
    heroImg.style.transform=`translate(calc(-50% + ${-x*15}px), calc(-50% + ${-y*10}px)) scale(${heroImg.classList.contains('hero-bg')?'1':'1'})`;
  });
  document.getElementById('hero').addEventListener('mouseleave',()=>{
    heroImg.style.transform='translate(-50%,-50%)';
  });
}

const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target)}});
},{threshold:0.1});
document.querySelectorAll('.video-card').forEach((el,i)=>{setTimeout(()=>observer.observe(el),i*60)});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.visibility='visible';t.style.opacity='1';t.style.bottom='50px';
  setTimeout(()=>{t.style.opacity='0';t.style.bottom='30px';setTimeout(()=>{t.style.visibility='hidden'},300)},2500);
}

const contentDiv=document.getElementById('typewriter-content');
const targetElement=document.getElementById('typewriter-target');
let hasTyped=false;

function typeWriter(element,htmlContent,speed=30){
  targetElement.innerHTML='';
  targetElement.classList.add('typing-cursor');
  const tempDiv=document.createElement('div');
  tempDiv.innerHTML=htmlContent;
  const nodes=Array.from(tempDiv.childNodes);
  let currentNodeIndex=0;
  let currentTextIndex=0;
  function typeNext(){
    if(currentNodeIndex<nodes.length){
      const node=nodes[currentNodeIndex];
      if(node.nodeType===Node.TEXT_NODE){
        if(currentTextIndex<node.textContent.length){
          targetElement.appendChild(document.createTextNode(node.textContent.charAt(currentTextIndex)));
          currentTextIndex++;
          setTimeout(typeNext,speed+Math.random()*20);
        }else{currentNodeIndex++;currentTextIndex=0;setTimeout(typeNext,speed)}
      }else if(node.nodeType===Node.ELEMENT_NODE){
        const clone=node.cloneNode(false);
        targetElement.appendChild(clone);
        let elemTextIndex=0;
        function typeElementText(){
          if(elemTextIndex<node.textContent.length){
            clone.appendChild(document.createTextNode(node.textContent.charAt(elemTextIndex)));
            elemTextIndex++;
            setTimeout(typeElementText,speed);
          }else{currentNodeIndex++;setTimeout(typeNext,speed)}
        }
        typeElementText();
      }
    }else{setTimeout(()=>{targetElement.classList.remove('typing-cursor')},2000)}
  }
  typeNext();
}

const aboutObserver=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting&&!hasTyped){
      setTimeout(()=>{typeWriter(targetElement,contentDiv.innerHTML,40);hasTyped=true},500);
    }
  });
},{threshold:0.3});
aboutObserver.observe(document.getElementById('about'));

const canvas=document.getElementById('particleCanvas');
const ctx=canvas.getContext('2d');
let particles=[];
function resizeCanvas(){
  canvas.width=canvas.parentElement.clientWidth;
  canvas.height=canvas.parentElement.clientHeight;
  initParticles();
}
class Particle{
  constructor(){
    this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;
    this.size=Math.random()*2+0.5;this.baseAlpha=Math.random()*0.5+0.1;
    this.alpha=this.baseAlpha;this.pulseSpeed=Math.random()*0.02+0.005;
    this.growing=Math.random()>0.5;this.color=Math.random()>0.8?'#FFFFFF':'#FAFF00';
  }
  update(){
    if(this.growing){this.alpha+=this.pulseSpeed;if(this.alpha>=1)this.growing=false}
    else{this.alpha-=this.pulseSpeed;if(this.alpha<=this.baseAlpha/2)this.growing=true}
  }
  draw(){
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=this.color;ctx.globalAlpha=this.alpha;ctx.fill();
  }
}
function initParticles(){
  particles=[];
  const n=(canvas.width*canvas.height)/10000;
  for(let i=0;i<n;i++)particles.push(new Particle());
}
function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.update();p.draw()});
  ctx.globalAlpha=1;
  requestAnimationFrame(animateParticles);
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();animateParticles();
</script>
